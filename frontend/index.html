<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 小助手 ✨</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-from:    #fff5f7;
  --bg-to:      #f0e6ff;
  --sidebar:    rgba(255,255,255,0.65);
  --card:       rgba(255,255,255,0.72);
  --card-solid: #ffffff;
  --border:     rgba(196,181,253,0.30);
  --border2:    rgba(249,168,212,0.20);
  --text:       #3d3250;
  --text2:      #6b5b7b;
  --text3:      #a89bb5;
  --primary:    #c4b5fd;
  --primary-d:  #a78bfa;
  --pink:       #f9a8d4;
  --pink-d:     #f472b6;--pink-l:     #fce7f3;
  --green:      #6ee7b7;
  --green-l:    #d1fae5;
  --amber:      #fbbf24;
  --amber-l:    #fef3c7;
  --red:        #fb7185;
  --red-l:      #ffe4e6;
  --blue:       #93c5fd;
  --blue-l:     #dbeafe;
  --shadow-pink:  0 4px 20px rgba(249,168,212,0.18);
  --shadow-purple:0 4px 20px rgba(196,181,253,0.18);
  --shadow-soft:  0 2px 12px rgba(160,130,200,0.10);
  --radius-sm:  10px;
  --radius-md:  16px;
  --radius-lg:  22px;
  --radius-pill: 999px;
}

body {
  font-family: "Hiragino Sans", "Yu Gothic", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 50%, #ede9fe 100%);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
  font-size: 14px;
  position: relative;
}

/* ── 背景装饰 ── */
.bg-decor {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-decor .star {
  position: absolute;
  font-size: 10px;
  opacity: 0;
  animation: twinkle 4s ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0; transform: scale(0.5); }
  50%     { opacity: 0.7; transform: scale(1.2); }
}
.bg-decor .sakura {
  position: absolute;
  font-size: 14px;
  opacity: 0;
  animation: sakuraFall linear infinite;
}
@keyframes sakuraFall {
  0%   { opacity: 0; transform: translateY(-20px) rotate(0deg) translateX(0); }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg) translateX(80px); }
}

/* ── scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

/* ════════════════════════════════════
   AUTH MODAL（登录 / 注册）
═════════════════════════════════════ */
.auth-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(60, 50, 80, 0.45);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  /* 默认隐藏，启动时若已登录则保持隐藏 */
  display: none;
}
.auth-overlay.show { display: flex; }
.auth-card {
  width: 360px;
  background: var(--card-solid);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-purple);
  padding: 28px 28px 24px;
}
.auth-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  margin-bottom: 4px;
}
.auth-sub {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  margin-bottom: 20px;
}
.auth-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
  background: rgba(196,181,253,0.10);
  border-radius: var(--radius-pill);
  padding: 4px;
}
.auth-tab {
  flex: 1;
  text-align: center;
  padding: 8px 0;
  border-radius: var(--radius-pill);
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.auth-tab.active {
  background: var(--card-solid);
  color: var(--primary-d);
  font-weight: 600;
  box-shadow: var(--shadow-soft);
}
.auth-field {
  margin-bottom: 14px;
}
.auth-field label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
}
.auth-field input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--card-solid);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.auth-field input:focus {
  border-color: var(--primary-d);
}
.auth-error {
  margin-bottom: 12px;
  padding: 8px 12px;
  background: var(--red-l);
  color: #b8425d;
  border-radius: var(--radius-sm);
  font-size: 12px;
  display: none;
}
.auth-error.show { display: block; }
.auth-submit {
  width: 100%;
  padding: 11px 0;
  border: none;
  border-radius: var(--radius-pill);
  background: linear-gradient(135deg, var(--pink-d) 0%, var(--primary-d) 100%);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}
.auth-submit:hover { transform: translateY(-1px); }
.auth-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* sidebar 底部用户信息 + 登出按钮 */
.user-bar {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
}
.user-bar .uname {
  color: var(--text);
  font-weight: 600;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.user-bar .logout-btn {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.user-bar .logout-btn:hover {
  background: var(--red-l);
  color: #b8425d;
  border-color: transparent;
}

/* ════════════════════════════════════
   SIDEBAR
════════════════════════════════════ */
.sidebar {
  width: 270px;
  min-width: 270px;
  background: var(--sidebar);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* Logo */
.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-mark {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--pink) 0%, var(--primary) 100%);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: var(--shadow-pink);
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 4px 16px rgba(249,168,212,0.25); }
  50%     { box-shadow: 0 4px 24px rgba(249,168,212,0.45); }
}
.logo-name  { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: 0.3px; }
.logo-sub   { font-size: 11px; color: var(--text3); margin-top: 2px; letter-spacing: 0.5px; }

/* Section labels */
.sec-label {
  padding: 16px 18px 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--pink-d);
  text-transform: uppercase;
}

/* ── 私人黑洞 ── */
.blackhole {
  padding: 0 14px 14px;
  flex-shrink: 0;
}

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-md);
  padding: 16px 14px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s, box-shadow .2s;
  background: rgba(255,255,255,0.4);
}
.upload-zone:hover { border-color: var(--pink); background: rgba(249,168,212,0.08); box-shadow: var(--shadow-pink); }
.upload-zone.drag  { border-color: var(--pink-d); background: rgba(249,168,212,0.12); box-shadow: var(--shadow-pink); }
.upload-zone .uz-icon { font-size: 24px; margin-bottom: 4px; }
.upload-zone .uz-text { font-size: 12px; color: var(--text2); font-weight: 500; }
.upload-zone .uz-sub  { font-size: 11px; color: var(--text3); margin-top: 3px; }
#fileInput { display: none; }

.doc-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
.library-panel {
  padding-bottom: 10px;
  max-height: 170px;
  overflow-y: auto;
  border-bottom: 1px solid rgba(196,181,253,0.16);
}
.doc-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: rgba(255,255,255,0.5);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--text2);
  border: 1px solid var(--border2);
  transition: background .15s;
  cursor: pointer;
}
.doc-item:hover { background: rgba(255,255,255,0.8); }
.doc-item .doc-icon { color: var(--pink-d); font-size: 13px; }
.doc-item .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.doc-item .doc-chunks { color: var(--text3); font-size: 11px; flex-shrink: 0; }
.doc-item .doc-del { cursor: pointer; color: #c4b0c8; font-size: 16px; font-weight: bold; line-height: 1; padding: 0 4px; border-radius: 6px; flex-shrink: 0; transition: color .15s, background .15s; }
.doc-item .doc-del:hover { color: var(--red); background: var(--red-l); }
.doc-item .doc-ingest { cursor: pointer; color: var(--primary-d); font-size: 13px; padding: 1px 5px; border-radius: 6px; flex-shrink: 0; transition: color .15s, background .15s; }
.doc-item .doc-ingest:hover { color: var(--pink-d); background: var(--pink-l); }
.doc-empty { font-size: 11px; color: var(--text3); padding: 7px 2px; line-height: 1.5; }
.sec-label-row { display: flex; align-items: center; justify-content: space-between; padding-right: 14px; }
.mini-refresh { border: 1px solid var(--border); background: rgba(255,255,255,.45); color: var(--text2); border-radius: 8px; padding: 2px 7px; font-size: 11px; cursor: pointer; }
.mini-refresh:hover { border-color: var(--pink); color: var(--pink-d); }

/* ── 近期对话 ── */
.recent {
  flex: 1;
  overflow-y: auto;
  padding: 0 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.session-item {
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .15s, box-shadow .15s;
  border: 1px solid transparent;
  display: flex; align-items: center; gap: 8px;
}
.session-item:hover  { background: rgba(255,255,255,0.5); }
.session-item.active { background: rgba(249,168,212,0.12); border-color: var(--border2); box-shadow: var(--shadow-soft); }
.sess-dot { font-size: 10px; flex-shrink: 0; }
.sess-info  { flex: 1; min-width: 0; }
.sess-title { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sess-meta  { font-size: 11px; color: var(--text3); margin-top: 2px; }
.sess-empty { font-size: 12px; color: var(--text3); padding: 10px 4px; }
.sess-del {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--text3);
  opacity: 0;
  transition: opacity .15s, background .15s, color .15s;
}
.session-item:hover .sess-del { opacity: 1; }
.sess-del:hover { background: var(--red-l); color: var(--red); }

/* New chat button */
.new-chat-btn {
  margin: 0 14px 14px;
  padding: 10px;
  background: linear-gradient(135deg, var(--pink) 0%, var(--primary) 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  width: calc(100% - 28px);
  transition: box-shadow .2s, transform .15s;
  box-shadow: var(--shadow-pink);
  letter-spacing: 0.3px;
}
.new-chat-btn:hover { box-shadow: 0 6px 24px rgba(249,168,212,0.35); transform: translateY(-1px); }
.new-chat-btn:active { transform: translateY(0); }

/* ════════════════════════════════════
   MAIN
════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
  z-index: 1;
}

/* ── Controls bar ── */
.controls-bar {
  background: var(--card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 10px 22px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  /* 提升 stacking context，确保 .tool-picker 下拉浮在消息气泡之上。
     旧实现里 .tool-picker 自己 z-index:100 但父级 .controls-bar 没设
     position/z-index，导致部分浏览器把它和 .messages 视作同层，下拉被气泡遮住。 */
  position: relative;
  z-index: 50;
}

/* RAG toggle */
.rag-toggle-wrap {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  border: 1.5px solid var(--border);
  background: var(--card);
  cursor: pointer;
  user-select: none;
  transition: border-color .2s, background .2s, box-shadow .2s;
}
.rag-toggle-wrap:hover { border-color: var(--pink); box-shadow: var(--shadow-pink); }
.rag-toggle-wrap.on    { border-color: var(--pink-d); background: rgba(249,168,212,0.10); box-shadow: var(--shadow-pink); }
.toggle-pill {
  width: 32px; height: 18px;
  background: linear-gradient(135deg, #e2d6f0, #d4c5e8);
  border-radius: 9px;
  position: relative;
  transition: background .25s;
  flex-shrink: 0;
}
.rag-toggle-wrap.on .toggle-pill { background: linear-gradient(135deg, var(--pink), var(--pink-d)); }
.toggle-pill::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: left .25s;
  box-shadow: 0 1px 4px rgba(160,130,200,0.25);
}
.rag-toggle-wrap.on .toggle-pill::after { left: 16px; }
.toggle-label { font-size: 12px; font-weight: 600; color: var(--text2); }
.rag-toggle-wrap.on .toggle-label { color: var(--pink-d); }

/* Tools button */
.tools-btn-wrap { position: relative; }
.tools-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  border: 1.5px solid var(--border);
  background: var(--card);
  cursor: pointer;
  user-select: none;
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  transition: border-color .2s, background .2s, box-shadow .2s;
}
.tools-btn:hover { border-color: var(--primary-d); box-shadow: var(--shadow-purple); }
.tools-btn.active { border-color: var(--primary-d); background: rgba(196,181,253,0.12); color: var(--primary-d); box-shadow: var(--shadow-purple); }
.tools-btn .tool-count {
  background: linear-gradient(135deg, var(--pink), var(--primary));
  color: #fff;
  border-radius: 8px;
  padding: 0 6px;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px;
  text-align: center;
}

/* Tool picker dropdown */
.tool-picker {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  background: var(--card-solid);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: 0 12px 40px rgba(160,130,200,0.18);
  padding: 10px;
  min-width: 260px;
  z-index: 100;
  display: none;
}
.tool-picker.open { display: block; animation: pickerIn .2s ease-out; }
@keyframes pickerIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.picker-title { font-size: 10px; font-weight: 700; color: var(--pink-d); text-transform: uppercase; letter-spacing: .8px; padding: 4px 8px 8px; }
.picker-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .12s;
}
.picker-item:hover { background: rgba(196,181,253,0.08); }
.picker-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--pink-d); cursor: pointer; flex-shrink: 0; }
.picker-item-icon { font-size: 18px; }
.picker-item-info .p-name { font-size: 12px; font-weight: 600; color: var(--text); }
.picker-item-info .p-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }
.picker-item-mcp { font-size: 9px; font-weight: 700; background: var(--pink-l); color: var(--pink-d); border-radius: 6px; padding: 1px 5px; margin-left: 4px; }

/* MCP add form */
.picker-divider { height: 1px; background: var(--border); margin: 8px 0; }
.mcp-add-btn {
  display: flex; align-items: center; gap: 6px;
  width: 100%; padding: 8px 10px;
  border: none; background: none;
  border-radius: var(--radius-sm); cursor: pointer;
  font-size: 12px; font-weight: 600; color: var(--primary-d);
  transition: background .12s;
}
.mcp-add-btn:hover { background: rgba(196,181,253,0.10); }
.mcp-form { display: none; padding: 8px 4px 4px; flex-direction: column; gap: 6px; }
.mcp-form.open { display: flex; }
.mcp-input {
  width: 100%;
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  color: var(--text);
  background: rgba(255,255,255,0.6);
  outline: none;
  font-family: inherit;
  transition: border-color .2s, box-shadow .2s;
}
.mcp-input:focus { border-color: var(--primary-d); box-shadow: 0 0 0 3px rgba(196,181,253,0.15); }
.mcp-submit {
  padding: 6px 12px;
  background: linear-gradient(135deg, var(--pink), var(--primary));
  color: #fff; border: none;
  border-radius: 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; align-self: flex-end;
  transition: box-shadow .2s;
  box-shadow: var(--shadow-pink);
}
.mcp-submit:hover { box-shadow: 0 4px 16px rgba(249,168,212,0.35); }

.controls-right { margin-left: auto; font-size: 12px; color: var(--text3); font-weight: 500; }

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 22px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Welcome */
.welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; text-align: center; padding: 40px;
}
.welcome-icon {
  font-size: 56px;
  margin-bottom: 16px;
  animation: welcomeFloat 3s ease-in-out infinite;
}
@keyframes welcomeFloat {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-8px); }
}
.welcome-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.welcome-desc  { font-size: 14px; color: var(--text2); line-height: 1.8; max-width: 400px; }

/* Message rows */
.msg-row {
  display: flex; gap: 12px; align-items: flex-start;
  animation: bubbleIn .35s ease-out;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg-row.user { flex-direction: row-reverse; }

.avatar {
  width: 36px; height: 36px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.avatar.ai   { background: linear-gradient(135deg, var(--primary), #ddd6fe); box-shadow: var(--shadow-purple); }
.avatar.user { background: linear-gradient(135deg, var(--pink), #fbcfe8); box-shadow: var(--shadow-pink); }

.msg-body { max-width: 68%; display: flex; flex-direction: column; gap: 4px; }
.msg-row.user .msg-body { align-items: flex-end; }

.msg-name { font-size: 11px; color: var(--text3); padding: 0 4px; font-weight: 500; }

.bubble {
  padding: 12px 16px;
  border-radius: var(--radius-md);
  line-height: 1.7;
  word-break: break-word;
}
.bubble.ai {
  background: var(--card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-top-left-radius: 6px;
  color: var(--text);
  box-shadow: var(--shadow-soft);
}
.bubble.user {
  background: linear-gradient(135deg, var(--pink), var(--primary));
  color: #fff;
  border-top-right-radius: 6px;
  box-shadow: var(--shadow-pink);
}

/* Typing indicator */

<script>
// ══════════════════════════════════════════
//  Auth: token + apiFetch wrapper
// ══════════════════════════════════════════
//
// 设计：
//   - JWT 存 localStorage（页面刷新不丢，关闭浏览器仍在）
//   - apiFetch 统一注入 Authorization header；401 自动登出 + 弹登录 modal
//   - 上传 multipart/form-data 走相同包装（不能手动设 Content-Type，
//     fetch 会自动加 boundary）
//   - 启动时若已有 token，直接走业务 init；否则弹登录 modal
//
const AUTH_TOKEN_KEY = 'agi_auth_token';
const AUTH_USER_KEY  = 'agi_auth_user';

function getToken() { return localStorage.getItem(AUTH_TOKEN_KEY) || ''; }
function getUsername() { return localStorage.getItem(AUTH_USER_KEY) || ''; }
function setAuth(token, username) {
  localStorage.setItem(AUTH_TOKEN_KEY, token);
  localStorage.setItem(AUTH_USER_KEY, username);
}
function clearAuth() {
  localStorage.removeItem(AUTH_TOKEN_KEY);
  localStorage.removeItem(AUTH_USER_KEY);
}

// apiFetch 包装 fetch：自动注入 Bearer token；401 时清 token 弹登录。
// 不修改 url/method/body，只补 Authorization header（保留调用方原 headers）。
async function apiFetch(url, options) {
  options = options || {};
  const headers = new Headers(options.headers || {});
  const tok = getToken();
  if (tok) headers.set('Authorization', 'Bearer ' + tok);
  options.headers = headers;
  const resp = await fetch(url, options);
  if (resp.status === 401) {
    // token 失效或缺失——清缓存 + 强制重新登录
    clearAuth();
    showAuthOverlay('会话已失效，请重新登录');
    // 抛错让上层 catch，避免继续处理空响应
    throw new Error('unauthorized');
  }
  return resp;
}

// ══════════════════════════════════════════
//  Auth Modal 控制
// ══════════════════════════════════════════
let authMode = 'login'; // 'login' | 'register'

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('authTabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('authTabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('authSubmitBtn').textContent = (mode === 'login') ? '登录' : '注册';
  document.getElementById('authSub').textContent = (mode === 'login') ? '登录以使用专属记忆' : '创建一个新账号';
  hideAuthError();
}

function showAuthOverlay(msg) {
  document.getElementById('authOverlay').classList.add('show');
  if (msg) showAuthError(msg);
}
function hideAuthOverlay() {
  document.getElementById('authOverlay').classList.remove('show');
  hideAuthError();
}
function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.add('show');
}
function hideAuthError() {
  document.getElementById('authError').classList.remove('show');
}

async function submitAuth() {
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!username || !password) {
    showAuthError('用户名和密码不能为空');
    return;
  }
  const btn = document.getElementById('authSubmitBtn');
  btn.disabled = true;
  btn.textContent = '处理中...';
  hideAuthError();

  const url = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
  try {
    // 注意：登录/注册端点本身不要求 token，所以这里直接用 fetch 而非 apiFetch
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (!resp.ok) {
      showAuthError(data.error || '操作失败');
      return;
    }
    setAuth(data.token, data.username);
    hideAuthOverlay();
    document.getElementById('authPassword').value = '';
    onAuthReady();
  } catch (e) {
    showAuthError('网络错误，请稍后再试');
  } finally {
    btn.disabled = false;
    btn.textContent = (authMode === 'login') ? '登录' : '注册';
  }
}

// 登录后或刷新页面 token 仍有效时调用——刷新 user-bar 并 init 业务
function onAuthReady() {
  const uname = getUsername();
  if (uname) {
    document.getElementById('userBarName').textContent = '👋 ' + uname;
    document.getElementById('userBar').style.display = 'flex';
  }
  initApp();
}

function logout() {
  // 防止已登出的用户的 SSE 还在跑（响应里可能含敏感数据）
  if (typeof abortInFlightChat === 'function') abortInFlightChat();
  clearAuth();
  document.getElementById('userBar').style.display = 'none';
  // 清运行时缓存避免上一个用户的会话/文档/工具列表残留到下一个用户。
  // 用 typeof 守卫——这些变量在脚本后部声明，logout 可能在它们就绪前被调用。
  if (typeof sessions !== 'undefined') {
    sessions = [];
    if (typeof renderSessions === 'function') renderSessions();
  }
  if (typeof uploadedDocs !== 'undefined') {
    uploadedDocs = [];
    if (typeof renderDocs === 'function') renderDocs();
  }
  if (typeof libraryDocs !== 'undefined') libraryDocs = [];
  if (typeof availableTools !== 'undefined') availableTools = [];
  showAuthOverlay();
}

// ══════════════════════════════════════════
//  Session management
// ══════════════════════════════════════════
function newSession() {
  // 切换前取消还在跑的 SSE，避免上一会话的 AI 回复延迟落到新会话里
  abortInFlightChat();
  const id = Date.now().toString();
  sessions.unshift({ id, title: '新对话', messages: [], ts: Date.now() });
  if (sessions.length > 5) sessions = sessions.slice(0, 5);
  currentId = id;
  saveSessions();
  renderSessions();
  clearMessages();
}

function switchSession(id) {
  // 同上：切到别的会话之前先把当前会话的 SSE 拦掉
  abortInFlightChat();
  currentId = id;
  renderSessions();
  const sess = sessions.find(s => s.id === id);
  if (!sess) return;
  clearMessages();
  sess.messages.forEach(m => appendBubble(m.role, m.html, true));
}

// abortInFlightChat 中断当前 SSE 请求，并复位 loading 状态。
// 用户切换会话/新建会话/登出时调用——避免 AI 回复延迟落到错误的会话里。
function abortInFlightChat() {
  if (window._chatAbortCtrl) {
    window._chatAbortCtrl.abort();
    window._chatAbortCtrl = null;
  }
  if (typeof setLoadingState === 'function') setLoadingState(false);
}

function saveSessions() {
  localStorage.setItem('ai_sessions', JSON.stringify(sessions));
}

function curSession() {
  return sessions.find(s => s.id === currentId);
}

function pushMessage(role, html) {
  pushMessageTo(currentId, role, html);
}

// pushMessageTo 把一条消息追加到指定 sessionId 的本地存储中。
// 比 pushMessage 多一层 sessionId 参数——SSE 流式回复期间用户可能切换会话，
// 必须用"请求开始时锁定的 sessionId"而非 currentId，否则回复会落错会话。
function pushMessageTo(sessionId, role, html) {
  if (!sessionId) return;
  const sess = sessions.find(s => s.id === sessionId);
  if (!sess) return;
  sess.messages.push({ role, html });
  if (sess.messages.length === 1 && role === 'user') {
    sess.title = html.replace(/<[^>]+>/g, '').slice(0, 20) || '新对话';
  }
  saveSessions();
  renderSessions();
}

function deleteSession(e, id) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (currentId === id) {
    currentId = sessions.length > 0 ? sessions[0].id : null;
    clearMessages();
    if (currentId) switchSession(currentId);
  }
  renderSessions();
}

function renderSessions() {
  const el = document.getElementById('sessionList');
  if (sessions.length === 0) {
    el.innerHTML = '<div class="sess-empty">暂无对话记录</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentId ? 'active' : ''}" onclick="switchSession('${s.id}')">
      <span class="sess-dot">🌸</span>
      <div class="sess-info">
        <div class="sess-title">${s.title}</div>
        <div class="sess-meta">${new Date(s.ts).toLocaleDateString('zh', {month:'short', day:'numeric'})}</div>
      </div>
      <div class="sess-del" onclick="deleteSession(event, '${s.id}')" title="删除">✕</div>
    </div>`).join('');
}

document.getElementById('fileInput').addEventListener('change', async e => {

});

  e.preventDefault(); zone.classList.remove('drag');
  for (const file of e.dataTransfer.files) await uploadFile(file);
});

async function uploadFile(file) {
  try {
    const form = new FormData();
    form.append('file', file);
    const res = await apiFetch('/api/upload', {
      method: 'POST',
      body: form
    }).then(r => r.json());

    const doc = {
      name: file.name,
      chunks: res.chunk_count,
      indexed: res.indexed_count || 0,
      parser: res.parser || '',
      pages: res.pages || 0,
      textChars: res.text_chars || 0,
      needsOCR: !!res.needs_ocr,
      docHash: res.doc_hash,
      ts: Date.now()
    };
    uploadedDocs = uploadedDocs.filter(d => d.name !== file.name);
    uploadedDocs.unshift(doc);
    localStorage.setItem('ai_docs', JSON.stringify(uploadedDocs));
    renderDocs();
  } catch(e) {
    console.error('上传失败', e);
  }
}

function renderDocs() {
  const el = document.getElementById('docList');
  if (uploadedDocs.length === 0) {
    el.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:6px 0">暂无文档</div>';
    return;
  }
  el.innerHTML = uploadedDocs.slice(0, 6).map(d => {
    const delBtn = d.docHash
      ? `<span class="doc-del" onclick="deleteDoc('${d.docHash}','${d.name}')" title="删除">×</span>`
      : '';
    const chunkLabel = d.needsOCR
      ? '需 OCR'
      : `${d.chunks || 0} 块${d.indexed ? `/${d.indexed}` : ''}`;
    const title = `${d.name}${d.pages ? ` · ${d.pages} 页` : ''}${d.textChars ? ` · ${d.textChars} 字` : ''}${d.parser ? ` · ${d.parser}` : ''}`;
    return `
    <div class="doc-item">
      <span class="doc-icon">${d.needsOCR ? '!' : '✓'}</span>
      <span class="doc-name" title="${title}">${d.name}</span>
      <span class="doc-chunks">${chunkLabel}</span>
      ${delBtn}
    </div>`;
  }).join('');
}

async function deleteDoc(docHash, name) {
  if (!confirm('确定删除「' + name + '」？')) return;
  try {
    const res = await apiFetch('/api/docs/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ doc_hash: docHash })
    });
    if (!res.ok) {
      console.error('删除失败:', res.status);
      return;
    }
    uploadedDocs = uploadedDocs.filter(d => d.docHash !== docHash);
    localStorage.setItem('ai_docs', JSON.stringify(uploadedDocs));
    renderDocs();
  } catch(e) {
    console.error('删除失败', e);
  }
}

async function loadLibraryDocs(e) {
  if (e && e.stopPropagation) e.stopPropagation();
  try {
    const res = await fetchDocumentJSON('/api/documents');
    libraryDocs = res.documents || [];
  } catch(e) {
    libraryDocs = [];
  }
  renderLibraryDocs();
}

function renderLibraryDocs() {
  const el = document.getElementById('libraryDocList');
  if (!el) return;
  if (libraryDocs.length === 0) {
    el.innerHTML = '<div class="doc-empty">暂无本地文档。让 Agent 生成报告并保存后，会出现在这里。</div>';
    return;
  }
  el.innerHTML = libraryDocs.slice(0, 8).map(d => `
    <div class="doc-item" role="button" onclick="viewLibraryDocument(event, '${escAttr(d.id)}')">
      <span class="doc-icon">§</span>
      <span class="doc-name" title="${escAttr(d.title || '')}">${escHtml(d.title || '未命名文档')}</span>
      <span class="doc-chunks">v${d.latest_version || 0}</span>
      <span class="doc-ingest" onclick="ingestLibraryDocument(event, '${escAttr(d.id)}')" title="重新入库 RAG">↻</span>
    </div>`).join('');
}

async function fetchDocumentJSON(url, options) {
  const resp = await apiFetch(url, options);
  const raw = await resp.text();
  let data = {};
  if (raw) {
    try {
      data = JSON.parse(raw);
    } catch(e) {
      data = { error: raw };
    }
  }
  if (!resp.ok) throw new Error(data.error || raw || `HTTP ${resp.status}`);
  return data;
}

async function viewLibraryDocument(e, id) {
  if (e && e.stopPropagation) e.stopPropagation();
  try {
    const res = await fetchDocumentJSON('/api/documents/' + encodeURIComponent(id));
    const doc = res.document || {};
    const ver = res.version || {};
    openDocumentViewer(doc, ver);
  } catch(e) {
    openDocumentViewer({ title: '读取文档失败', id: '' }, { content_md: e.message });
  }
}

async function ingestLibraryDocument(e, id) {
  if (e && e.stopPropagation) e.stopPropagation();
  try {
    const res = await ingestDocumentByID(id);
    appendBubble('ai', `文档已重新入库：${res.indexed_count || 0}/${res.chunk_count || 0} 个 chunk`, false);
  } catch(err) {
    appendBubble('ai', '入库失败：' + err.message);
  }
}

async function ingestDocumentByID(id) {
  const res = await fetchDocumentJSON('/api/documents/' + encodeURIComponent(id) + '/ingest', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: '{}'
  });
  loadLibraryDocs();
  return res;
}

function openDocumentViewer(doc, ver) {
  currentViewerDocId = doc.id || null;
  const viewer = document.getElementById('docViewer');
  const title = document.getElementById('docViewerTitle');
  const meta = document.getElementById('docViewerMeta');
  const content = document.getElementById('docViewerContent');
  const ingestBtn = document.getElementById('docViewerIngest');
  const version = doc.latest_version || ver.version || 0;
  const updated = formatDocTime(doc.updated_at || ver.created_at);
  title.textContent = doc.title || '本地文档';
  meta.dataset.base = `v${version} · ${doc.doc_type || 'document'} · ${doc.source || 'local'}${updated ? ' · ' + updated : ''}`;
  meta.textContent = meta.dataset.base;
  content.textContent = ver.content_md || '（空文档）';
  ingestBtn.disabled = !currentViewerDocId;
  viewer.classList.add('open');
}

function closeDocumentViewer(e) {
  if (e && e.currentTarget && e.target !== e.currentTarget) return;
  const viewer = document.getElementById('docViewer');
  if (viewer) viewer.classList.remove('open');
  currentViewerDocId = null;
}

async function ingestCurrentViewerDocument() {
  if (!currentViewerDocId) return;
  const btn = document.getElementById('docViewerIngest');
  const meta = document.getElementById('docViewerMeta');
  const base = meta.dataset.base || meta.textContent || '';
  btn.disabled = true;
  meta.textContent = `${base} · 入库中...`;
  try {
    const res = await ingestDocumentByID(currentViewerDocId);
    meta.textContent = `${base} · 已入库 ${res.indexed_count || 0}/${res.chunk_count || 0} chunks`;
  } catch(err) {
    meta.textContent = `${base} · 入库失败：${err.message}`;
  } finally {
    btn.disabled = false;
  }
}

function formatDocTime(value) {
  if (!value) return '';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '';
  return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDocumentViewer();
});

function clearMessages() {

function hideWelcome() {

  if (w) w.remove();

function appendBubble(role, html, isHtml = false) {
  hideWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'msg-row ' + role;
  const name = role === 'user' ? '你' : 'AI 小助手';
  const icon = role === 'user' ? '🌸' : '🐱';
  wrap.innerHTML = `
    <div class="avatar ${role}">${icon}</div>
    <div class="msg-body">
      <div class="msg-name">${name}</div>
      <div class="bubble ${role}">${isHtml ? html : escHtml(html)}</div>
    </div>`;
  document.getElementById('messages').appendChild(wrap);
  document.getElementById('messages').scrollTop = 999999;
  return wrap;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function escAttr(s) {
  return escHtml(String(s || '')).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ══════════════════════════════════════════
//  Build reply HTML
// ══════════════════════════════════════════
function buildReply(data) {
  const parts = [];

  if (data.extracted_info) {
    parts.push(`<div class="memory-note">💎 ${escHtml(data.extracted_info)}</div>`);
  }

  const hasSteps   = data.steps  && data.steps.length > 0;
  const hasTool    = data.tool_call && data.tool_call.tool_name;
  const hasRAG     = data.search_results && data.search_results.length > 0;
  const mode       = data.mode || 'chat';

  if (hasSteps || hasTool || hasRAG) {
    const badgeClass = { react:'badge-react', tool:'badge-tool', rag:'badge-rag', memory:'badge-memory' }[mode] || '';
    const badgeText  = { react:'ReAct 推理', tool:'工具调用', rag:'知识检索', memory:'记忆增强' }[mode] || mode;
    const thinkId    = 'think_' + Date.now();

    let bodyHtml = '';

    if (hasSteps) {
      const typeMap = {
        'Thought':      ['step-thought',     '💭 思考'],
        'Action':       ['step-action',       '⚡ 动作'],
        'Observation':  ['step-observation',  '🔍 观察'],
        'Final Answer': ['step-final',        '✨ 汇总'],
      };
      for (const s of data.steps) {
        const [cls, label] = typeMap[s.type] || ['step-thought', s.type];
        let paramsHtml = '';
        if (s.params && Object.keys(s.params).length > 0) {
          paramsHtml = `<div class="step-params">${escHtml(JSON.stringify(s.params))}</div>`;
        }
        bodyHtml += `
          <div class="step-row">
            <span class="step-type ${cls}">${label}</span>
            <div class="step-content">${escHtml(s.content)}${paramsHtml}</div>
          </div>`;
      }
    }

    if (hasTool && !hasSteps) {
      const tc = data.tool_call;
      const paramsStr = tc.params ? JSON.stringify(tc.params) : '{}';
      bodyHtml += `<div class="tool-call-block">
        <div class="tool-call-row"><span class="tool-call-label">工具</span><span class="tool-call-val">${escHtml(tc.tool_name)}</span></div>
        <div class="tool-call-row"><span class="tool-call-label">参数</span><span class="tool-call-val" style="font-family:monospace">${escHtml(paramsStr)}</span></div>
        <div class="tool-call-row"><span class="tool-call-label">结果</span><span class="tool-call-val tool-call-result">${escHtml(tc.tool_result || '')}</span></div>
      </div>`;
    }

    if (hasRAG) {
      bodyHtml += `<div class="rag-sources">`;
      for (const r of data.search_results.slice(0, 3)) {
        const score = (r.similarity * 100).toFixed(1);
        const preview = (r.chunk && r.chunk.content) ? r.chunk.content.slice(0, 120) : '';
        bodyHtml += `<div class="rag-chunk"><span class="rag-chunk-score">相关度 ${score}%</span>${escHtml(preview)}${preview.length >= 120 ? '…' : ''}</div>`;
      }
      bodyHtml += `</div>`;
    }

    parts.push(`
      <div class="think-wrap">
        <div class="think-header" id="${thinkId}_hdr" onclick="toggleThink('${thinkId}')">
          <span class="think-icon">▶</span>
          <span class="think-label">思考过程</span>
          <span class="think-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="think-body" id="${thinkId}_body">${bodyHtml}</div>
      </div>`);
  }

  if (data.interrupted) {
    parts.push('<div class="interrupted-badge">🌸 已中断</div>');
  }

  parts.push(`<div class="answer-text">${escHtml(data.answer || '')}</div>`);

  return parts.join('');
}

function toggleThink(id) {
  const hdr  = document.getElementById(id + '_hdr');
  const body = document.getElementById(id + '_body');
  const open = body.classList.toggle('open');
  hdr.classList.toggle('open', open);
}

function handleSendBtn() {
  if (isLoading) {
    stopChat();
  } else {
    send();

function stopChat() {
  if (window._chatAbortCtrl) {
    window._chatAbortCtrl.abort();
    window._chatAbortCtrl = null;
  }
  apiFetch('/api/chat/cancel', { method: 'POST' }).catch(() => {});
  setLoadingState(false);
}

function setLoadingState(loading) {
  isLoading = loading;
  const btn = document.getElementById('sendBtn');
  if (loading) {
    btn.textContent = '■';
    btn.classList.add('stop');
    btn.disabled = false;
  } else {
    btn.textContent = '✨';
    btn.classList.remove('stop');
    btn.disabled = false;
  }
}

async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg || isLoading) return;

  if (!currentId) newSession();

  // 锚定本次请求所属会话——之后所有 pushMessage 都走 pushMessageTo(sessionId, ...)
  // 即使期间用户切到别的会话，AI 回复仍然落回原会话；用户切回去能看到完整对话
  const sessionId = currentId;

  const userHtml = escHtml(msg);
  appendBubble('user', msg);
  pushMessageTo(sessionId, 'user', userHtml);
  input.value = ''; autoResize(input);

  setLoadingState(true);

  hideWelcome();
  const aiWrap = document.createElement('div');
  aiWrap.className = 'msg-row ai';
  const thinkId = 'think_' + Date.now();
  aiWrap.innerHTML = `
    <div class="avatar ai">🐱</div>
    <div class="msg-body">
      <div class="msg-name">AI 小助手</div>
      <div class="bubble ai">
        <div class="stream-think-wrap" style="display:none">
          <div class="think-header open" id="${thinkId}_hdr" onclick="toggleThink('${thinkId}')">
            <span class="think-icon">▶</span>
            <span class="think-label">思考过程</span>
            <span class="think-badge badge-react">推理中</span>
          </div>
          <div class="think-body open" id="${thinkId}_body"></div>
        </div>
        <div class="stream-memory" style="display:none"></div>
        <div class="stream-tool-call" style="display:none"></div>
        <div class="stream-rag" style="display:none"></div>
        <div class="stream-answer"><div class="typing"><span></span><span></span><span></span></div></div>
      </div>
    </div>`;
  document.getElementById('messages').appendChild(aiWrap);
  document.getElementById('messages').scrollTop = 999999;

  const bubble = aiWrap.querySelector('.bubble.ai');
  const thinkWrap = aiWrap.querySelector('.stream-think-wrap');
  const thinkBody = aiWrap.querySelector(`#${thinkId}_body`);
  const memoryEl = aiWrap.querySelector('.stream-memory');
  const toolCallEl = aiWrap.querySelector('.stream-tool-call');
  const ragEl = aiWrap.querySelector('.stream-rag');
  const answerEl = aiWrap.querySelector('.stream-answer');
  let answerText = '';

  window._chatAbortCtrl = new AbortController();

  try {
    const body = { message: msg, use_rag: ragOn, selected_tools: selectedTools, explicit: true };

    const resp = await apiFetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: window._chatAbortCtrl.signal
    });

    if (!resp.ok) {
      aiWrap.remove();
      const syncData = await apiFetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(r => r.json());
      const replyHtml = buildReply(syncData);
      const msgEl = appendBubble('ai', replyHtml, true);
      autoExpandThinking(msgEl, syncData);
      pushMessageTo(sessionId, 'ai', replyHtml);
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      sseBuffer += decoder.decode(value, { stream: true });
      const parts = sseBuffer.split('\n\n');
      sseBuffer = parts.pop();

      for (const part of parts) {
        let evtName = '', evtData = '';
        for (const line of part.split('\n')) {
          if (line.startsWith('event: ')) evtName = line.slice(7).trim();
          if (line.startsWith('data: ')) evtData = line.slice(6);
        }
        if (!evtData) continue;
        let data;
        try { data = JSON.parse(evtData); } catch(e) { continue; }

        switch (evtName) {
          case 'route': {
            const badgeEl = thinkWrap.querySelector('.think-badge');
            const modeLabels = { react:'ReAct 推理', tool:'工具调用', rag:'知识检索', chat:'对话' };
            const modeClasses = { react:'badge-react', tool:'badge-tool', rag:'badge-rag', chat:'badge-react' };
            if (badgeEl) {
              badgeEl.textContent = modeLabels[data.mode] || data.mode;
              badgeEl.className = 'think-badge ' + (modeClasses[data.mode] || '');
            }
            if (data.mode !== 'chat') {
              thinkWrap.style.display = '';
            }
            break;
          }
          case 'memory': {
            memoryEl.innerHTML = `<div class="memory-note">💎 ${escHtml(data.extracted_info || '')}</div>`;
            memoryEl.style.display = '';
            break;
          }
          case 'step': {
            thinkWrap.style.display = '';
            const typeMap = {
              'Thought':      ['step-thought',     '💭 思考'],
              'Action':       ['step-action',       '⚡ 动作'],
              'Observation':  ['step-observation',  '🔍 观察'],
              'Final Answer': ['step-final',        '✨ 汇总'],
            };
            const [cls, label] = typeMap[data.type] || ['step-thought', data.type];
            let paramsHtml = '';
            if (data.params && Object.keys(data.params).length > 0) {
              paramsHtml = `<div class="step-params">${escHtml(JSON.stringify(data.params))}</div>`;
            }
            thinkBody.innerHTML += `
              <div class="step-row">
                <span class="step-type ${cls}">${label}</span>
                <div class="step-content">${escHtml(data.content || '')}${paramsHtml}</div>
              </div>`;
            break;
          }
          case 'tool_call': {
            const paramsStr = data.params ? JSON.stringify(data.params) : '{}';
            toolCallEl.innerHTML = `<div class="tool-call-block">
              <div class="tool-call-row"><span class="tool-call-label">工具</span><span class="tool-call-val">${escHtml(data.tool_name)}</span></div>
              <div class="tool-call-row"><span class="tool-call-label">参数</span><span class="tool-call-val" style="font-family:monospace">${escHtml(paramsStr)}</span></div>
              <div class="tool-call-row"><span class="tool-call-label">结果</span><span class="tool-call-val tool-call-result">${escHtml(data.tool_result || '')}</span></div>
            </div>`;
            toolCallEl.style.display = '';
            break;
          }
          case 'rag_result': {
            let ragHtml = '<div class="rag-sources">';
            const results = data.search_results || [];
            for (const r of results.slice(0, 3)) {
              const score = (r.similarity * 100).toFixed(1);
              const preview = (r.chunk && r.chunk.content) ? r.chunk.content.slice(0, 120) : '';
              ragHtml += `<div class="rag-chunk"><span class="rag-chunk-score">相关度 ${score}%</span>${escHtml(preview)}${preview.length >= 120 ? '…' : ''}</div>`;
            }
            ragHtml += '</div>';
            ragEl.innerHTML = ragHtml;
            ragEl.style.display = '';
            break;
          }
          case 'token': {
            const typing = answerEl.querySelector('.typing');
            if (typing) typing.remove();
            answerText += (data.content || '');
            answerEl.innerHTML = `<div class="answer-text">${escHtml(answerText)}</div>`;
            break;
          }
          case 'done': {
            const typing2 = answerEl.querySelector('.typing');
            if (typing2) typing2.remove();
            if (!answerText && data.answer) {
              answerText = data.answer;
              answerEl.innerHTML = `<div class="answer-text">${escHtml(answerText)}</div>`;
            }
            if (data.interrupted) {
              answerEl.innerHTML = `<div class="interrupted-badge">🌸 已中断</div>` + answerEl.innerHTML;
            }
            break;
          }
        }
        document.getElementById('messages').scrollTop = 999999;
      }
    }

    if (sseBuffer.trim()) {
      for (const line of sseBuffer.split('\n')) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.answer && !answerText) {
              answerText = data.answer;
              const typing = answerEl.querySelector('.typing');
              if (typing) typing.remove();
              answerEl.innerHTML = `<div class="answer-text">${escHtml(answerText)}</div>`;
            }
          } catch(e) {}
        }
      }
    }

    const replyHtml = bubble.innerHTML;
    pushMessageTo(sessionId, 'ai', replyHtml);
    loadLibraryDocs();

  } catch(e) {
    const typing = answerEl.querySelector('.typing');
    if (typing) typing.remove();
    if (e.name === 'AbortError') {
      answerEl.innerHTML = `<div class="answer-text">🌸 已中断</div>`;
      pushMessageTo(sessionId, 'ai', '🌸 已中断');
    } else {
      answerEl.innerHTML = `<div class="answer-text">❌ 请求失败，请检查服务是否正常运行。</div>`;
      pushMessageTo(sessionId, 'ai', '❌ 请求失败');
    }
  } finally {
    setLoadingState(false);
    window._chatAbortCtrl = null;
  }
}

function autoExpandThinking(msgEl, data) {
  if (selectedTools.length > 0 || data.mode === 'react' || data.mode === 'tool' || data.mode === 'rag') {
    const body = msgEl.querySelector('.think-body');
    const hdr  = msgEl.querySelector('.think-header');
    if (body) body.classList.add('open');
    if (hdr)  hdr.classList.add('open');
  }
}

function qs(msg) {
  document.getElementById('input').value = msg;
  send();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ══════════════════════════════════════════
//  Init（门控版：登录后才 init 业务）
// ══════════════════════════════════════════
//
// initApp 会被两条路径调用：
//   1) 启动时已有 token（getToken() 非空）→ onAuthReady → initApp
//   2) 弹了登录 modal，用户登录/注册成功 → onAuthReady → initApp
// 任意 401 都会清 token + 弹 modal，登录后再次 initApp。
// 多次调用安全：renderSessions / loadTools 等都是幂等覆盖。
function initApp() {
  renderSessions();
  renderDocs();
  loadLibraryDocs();
  loadTools();
  // 不自动切换会话——侧边栏展示给用户选
}

// 启动入口：检查 token，无则弹登录
(function bootstrap() {
  if (getToken()) {
    onAuthReady();
  } else {
    showAuthOverlay();
  }
})();
</script>
</body>
</html>

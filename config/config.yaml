# 对话模型配置
llm:
  api_url: https://open.bigmodel.cn/api/paas/v4/chat/completions
  api_key: "."
  model: glm-5.2
  temperature: 1.0
embedding:
  api_url: https://open.bigmodel.cn/api/paas/v4/embeddings
  api_key: "."
  model: glm-5.2

# 向量数据库配置
milvus:
  host: localhost
  port: 19530

# 关系型数据库配置
postgres:
  host: localhost
  port: 5432
  user: aiagent
  password: aiagent123
  database: aiagent

elasticsearch:
  addresses:
    - http://localhost:9200
  username: elastic
  password: changeme

kafka:
  brokers:
    - localhost:29092
  topic: agent-events

#rag策略
rag:
  chunk_size: 200
  chunk_overlap: 50
  top_k: 3
  rrf_constant_k: 60
  semantic_weight: 0.7
  enable_hybrid_search: true
  rag_milvus_dim: 2048

  # Query Rewrite：history-aware + multi-query
  # 多轮指代消除 + 单查询召回扩展，对短/口语化 query 收益最大
  rewrite:
    enabled: true
    num_queries: 3        # 含原查询在内的目标改写条数

  # Rerank：LLM listwise 精排
  # 召回阶段会自动扩大到 4*top_k，rerank 后再截回 top_k
  rerank:
    enabled: true
    preview_len: 200      # 给 reranker 看的每条候选最大字符数

memory:
  short_term_max_turns: 5
  long_term_top_k: 3
  consolidation:
    similarity_threshold: 0.80   # 合并阈值：超过此相似度的记忆会被合并
    dedup_threshold: 0.95        # 去重阈值：超过此相似度的记忆视为重复
    ttl_days: 30                 # 过期天数：超过此天数的低重要性记忆会被淘汰
    decay_rate: 0.995            # 每日衰减系数（0.995 = 每天保留 99.5%）
    min_importance: 0.3          # 低于此重要性 + 超 TTL 的记忆会被淘汰
    trigger_interval: 5          # 每存入 N 条新记忆后触发合并

harness:
  max_retries: 3
  retry_delay_ms: 200
  step_timeout_ms: 5000
  max_iterations: 5

server:
  port: "8090"

search:
  api_key: "你的key"               # 请填入你的 Tavily API Key（可选）
  api_url: "https://tavily.com"

# ===== 知识图谱（Neo4j，可选，不可用时跳过图检索）=====
neo4j:
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "password123"
  max_hops: 2        # 图遍历最大跳数
  weight: 0.3        # 图检索在 RRF 融合中的权重
  enabled: true      # false 时完全跳过知识图谱

# ===== 沙箱执行（用于终端命令工具）=====
sandbox:
  enabled: true
  backend: "docker"     # "docker" | "local" | "mock"
  image: "ubuntu:22.04"
  timeout_ms: 30000
  max_output_bytes: 65536
  memory_limit_mb: 256
  cpu_percent: 50
  max_pids: 64
  network_disabled: true
  readonly_rootfs: true

# ===== 命令安全校验 =====
security:
  max_command_length: 500
  allowlist_mode: false  # true = 白名单模式，只允许明确列出的命令
  allowlist:
    - "ls"
    - "cat"
    - "echo"
    - "pwd"
    - "date"
    - "python3"
    - "node"
    - "go"
    - "java"

# ===== 图运行时（ReAct 并行调度 + 竞速 + Replan）=====
graph_runtime:
  max_parallel: 2            # 最大并行执行节点数
  race_timeout_ms: 30000     # 竞速组内节点超时
  enable_racing: true        # 是否启用竞速机制（First-success-wins）
  replan_enabled: true       # 每层执行完让 LLM 看观察 → 决定追加/替换节点（Plan-and-ReAct）
  max_replan: 2              # 单次任务最多 replan 次数上限，防止死循环
  replan_on_failed: true     # 节点失败时触发局部 replan（补一个替代节点）

# ===== 认证 / JWT =====
# 生产环境强制通过环境变量 JWT_SECRET 注入，至少 32 字节随机
# 本地开发可以直接写一段固定字符串（≥ 32 字符）方便调试
auth:
  jwt_secret: "${JWT_SECRET}"
  jwt_ttl_hours: 168          # access token 有效期：7 天
  jwt_issuer: "agi-assistant"
